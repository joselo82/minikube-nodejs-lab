name: Deploy to Minikube using GitHub Actions

on:
  push:
    branches: [ main, master ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    name: Build & Deploy Node.js App to Minikube

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Start Docker
      run: |
        sudo systemctl start docker
        sudo systemctl enable docker
        docker version

    - name: Start Minikube
      uses: medyagh/setup-minikube@master
      with:
        driver: docker

    - name: Build Docker image
      run: |
        eval $(minikube -p minikube docker-env)
        docker build -t joselo82/node-app:latest .
        docker images

    - name: Deploy to Minikube
      run: |
        kubectl apply -f k8s-node-app.yaml
        sleep 15
        echo "=== Pods ==="
        kubectl get pods -o wide
        echo "=== Services ==="
        kubectl get svc
        echo "=== Deployment describe ==="
        kubectl describe deployment nodejs-app
        echo "=== Pod describe ==="
        kubectl describe pod -l app=nodejs-app || echo "No pod found"
        echo "=== Pod Logs ==="
        kubectl logs -l app=nodejs-app --tail=50 || echo "No logs"

    - name: Test service
      run: |
        echo "=== Service List ==="
        minikube service list
        echo "=== Opening service URL ==="
        minikube service nodejs-app --url
