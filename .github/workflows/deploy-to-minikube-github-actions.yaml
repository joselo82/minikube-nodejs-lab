name: Deploy to Minikube using GitHub Actions

on:
  push:
    branches: [ main, master ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    name: Build & Deploy to Minikube

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Start Minikube
      uses: medyagh/setup-minikube@master
      with:
        driver: docker

    - name: Build image
      run: |
        eval $(minikube -p minikube docker-env)
        docker build -t joselo82/node-app:latest .
        docker images

    - name: Deploy to Minikube
      run: |
        kubectl apply -f k8s-node-app.yaml
        sleep 15
        echo "=== Pods ==="
        kubectl get pods -o wide
        echo "=== Deployment ==="
        kubectl describe deployment nodejs-app
        echo "=== Pod describe ==="
        kubectl describe pod -l app=nodejs-app || echo "No pod found"
        echo "=== Logs ==="
        kubectl logs -l app=nodejs-app --tail=30 || echo "No logs"

    - name: Test service
      run: |
        minikube service list
        minikube service nodejs-app --url || echo "Service check failed"
