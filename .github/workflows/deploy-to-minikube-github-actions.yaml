name: Deploy to Minikube using GitHub Actions

on: [push]

jobs:
  job1:
    runs-on: ubuntu-latest
    name: build Node.js Docker Image and deploy to minikube
    steps:
    - uses: actions/checkout@v2
    - name: Start minikube
      uses: medyagh/setup-minikube@master
    - name: Try the cluster !
      run: kubectl get pods -A
    - name: Build image
      run: |
          echo "=== Final Pods status ==="
        kubectl get pods -o wide
        echo "=== Final Service status ==="
        kubectl get svc
        echo "=== Pod description (if any) ==="
        kubectl describe pod -l app=nodejs-app || echo "No pods found"
        echo "=== Trying service anyway ==="
        minikube service list
        minikube service nodejs-app --url || echo "Service check failed as expected"
    - name: Deploy to minikube
      run:
        kubectl apply -f k8s-node-app.yaml
    - name: Test service URLs
      run: |
          minikube service list
          minikube service nodejs-app --url
